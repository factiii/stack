name: Stack PR → Staging

# Generated by @factiii/stack v{VERSION}
# On a PR to main: build + deploy to staging on the self-hosted staging runner.
# The runner IS the staging host (vault is local; reachability solved; EAS runs here).
# Thin per STANDARDS: trigger + secrets + bootstrap + one CLI call.
# All build/deploy/mobile-break logic lives in `npx stack deploy --staging`.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# One staging deploy per PR at a time; newer pushes supersede in-flight runs.
concurrency:
  group: staging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  staging:
    runs-on: [self-hosted, staging]
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Deploy to staging
        run: npx stack deploy --staging
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          COMMIT_HASH: ${{ github.event.pull_request.head.sha }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
